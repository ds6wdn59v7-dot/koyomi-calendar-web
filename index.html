<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf6ec">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>和暦カレンダー</title>
<style>
:root, [data-palette="paper"] {
  --paper:#faf6ec; --paper2:#f3ecdb; --ink:#2b2b2b; --ink-soft:#574e3e;
  --sub:#6f6450; --faint:#b8ad94; --red:#b0433a; --red-soft:#c47368;
  --gold:#9a8c6a; --sat:#5b6b7a; --line:rgba(43,43,43,.14); --line2:rgba(43,43,43,.07);
  --sel:#b0433a; --chip-bg:rgba(176,67,58,.10); --grid-bg:rgba(255,255,255,.35);
}
[data-palette="sumi"] {
  --paper:#20242b; --paper2:#262b33; --ink:#ece6d6; --ink-soft:#c7c0ad;
  --sub:#a89d8c; --faint:#6c6557; --red:#df8975; --red-soft:#c97b69;
  --gold:#c8ae74; --sat:#93abbd; --line:rgba(236,230,214,.13); --line2:rgba(236,230,214,.06);
  --sel:#df8975; --chip-bg:rgba(223,137,117,.14); --grid-bg:rgba(255,255,255,.03);
}
[data-palette="ai"] {
  --paper:#f6f4ef; --paper2:#ece8df; --ink:#1f2630; --ink-soft:#3f4a57;
  --sub:#5d6875; --faint:#aab2bb; --red:#2f5d70; --red-soft:#5f8597;
  --gold:#b08a4a; --sat:#5a7382; --line:rgba(31,38,48,.13); --line2:rgba(31,38,48,.06);
  --sel:#2f5d70; --chip-bg:rgba(47,93,112,.10); --grid-bg:rgba(255,255,255,.4);
}
[data-palette="pop"] {
  --paper:#fff7e8; --paper2:#ffecd9; --ink:#403038; --ink-soft:#6b4f5b;
  --sub:#7d6670; --faint:#cdb9c2; --red:#ff5d73; --red-soft:#ff8fa0;
  --gold:#ffa726; --sat:#1fb7a6; --line:rgba(64,48,56,.16); --line2:rgba(64,48,56,.08);
  --sel:#ff5d73; --chip-bg:rgba(255,93,115,.12); --grid-bg:rgba(255,255,255,.55);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body {
  background:var(--paper); color:var(--ink);
  font-family:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  overscroll-behavior:none;
}
body[data-font="mincho"], body[data-font="mincho"] input, body[data-font="mincho"] select,
.serif { font-family:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif; }
button { font:inherit; color:inherit; background:none; border:none; cursor:pointer; }

/* ===== 画面 ===== */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; background:var(--paper);
  padding-top:env(safe-area-inset-top); transition:transform .25s ease; }
#detailScreen { transform:translateX(100%); z-index:10; }
#detailScreen.open { transform:translateX(0); }

/* ===== 月ヘッダー ===== */
.mhead { position:relative; text-align:center; padding:14px 18px 10px; }
.mhead .era { font-size:12px; letter-spacing:4px; font-weight:700; color:var(--red); }
.mhead .ym { display:flex; align-items:center; justify-content:center; gap:18px; margin-top:4px; }
.mhead .ylabels { display:flex; align-items:baseline; gap:10px; }
.mhead .y { font-size:16px; font-weight:600; color:var(--sub); }
.mhead .m { font-size:38px; font-weight:900; }
.mhead .wafu { font-size:17px; letter-spacing:2px; font-weight:600; color:var(--gold); }
.nav-btn { width:36px; height:36px;
  border-radius:50%; background:var(--grid-bg); border:1px solid var(--line);
  color:var(--sub); font-size:14px; display:flex; align-items:center; justify-content:center; }
.gear-btn { position:absolute; right:14px; top:18px; width:36px; height:36px;
  border-radius:50%; background:var(--grid-bg); border:1px solid var(--line); color:var(--sub); font-size:18px;
  display:flex; align-items:center; justify-content:center; padding:0; line-height:1; }
.micon { position:absolute; left:16px; top:16px; font-size:27px; line-height:1; pointer-events:none;
  animation:micon-float 3.2s ease-in-out infinite; transform-origin:50% 100%; }
@keyframes micon-float {
  0%, 100% { transform:translateY(0) rotate(-5deg); }
  50% { transform:translateY(-4px) rotate(5deg); }
}
#gcalBanner { display:block; width:100%; padding:8px 12px; font-size:12px; font-weight:700;
  background:var(--chip-bg); color:var(--red); border-top:1px solid var(--line2); text-align:center; }
#gcalBanner[hidden] { display:none; }
/* カレンダーのセル内に表示する天気 */
.cell .wx-ic { position:absolute; top:3px; right:3px; font-size:11px; line-height:1; text-align:center; }
.cell .wx-ic b { display:block; font-size:7.5px; font-weight:700; color:var(--red); margin-top:1px; }
#installBtn { display:block; width:100%; margin-bottom:14px; padding:12px; border-radius:12px;
  background:var(--red); color:#fff; font-size:14px; font-weight:700; }
#installBtn[hidden] { display:none; }
.modal .step { display:flex; align-items:center; gap:10px; font-size:13.5px; margin:10px 0; }
.modal .step b { flex:none; width:22px; height:22px; border-radius:50%; background:var(--red); color:#fff;
  font-size:12px; display:flex; align-items:center; justify-content:center; }
.modal .ios-share { display:inline-block; vertical-align:-3px; }

/* ===== 週・グリッド ===== */
.wrow { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid var(--line); }
.wrow span { text-align:center; padding:6px 0; font-size:12px; font-weight:700; color:var(--ink-soft); }
.wrow span:first-child { color:var(--red); } .wrow span:last-child { color:var(--sat); }
.grid-wrap { flex:1; overflow-y:auto; padding:4px 8px calc(12px + env(safe-area-inset-bottom)); }
.grid { display:grid; grid-template-columns:repeat(7,1fr); }
.cell { position:relative; display:flex; flex-direction:column; align-items:center;
  min-height:72px; padding:6px 0 4px; border-bottom:1px solid var(--line2); }
.cell .roku { height:11px; font-size:8.5px; font-weight:700; color:var(--sub); }
.cell .roku.taian { color:var(--red); } .cell .roku.butsu { color:var(--faint); }
.cell .num { font-size:18px; font-weight:700; line-height:1.2; }
.cell.sun .num { color:var(--red); } .cell.sat .num { color:var(--sat); }
.cell .old { font-size:10px; color:var(--ink-soft); font-weight:700; letter-spacing:0.5px; height:13px; }
.cell .old.full { color:#d9a516; font-weight:800; }
.cell .old.new { color:var(--red); font-weight:800; }
.cell .moon svg { overflow:visible; }
.cell .moon { height:13px; margin-top:1px; }
.cell .marks { height:11px; display:flex; gap:2px; align-items:center; margin-top:1px; font-size:9px; }
.cell .marks i { width:5px; height:5px; border-radius:50%; display:block; }
.cell .marks .tmark { font-size:8px; font-weight:800; color:#fff; border-radius:50%;
  width:11px; height:11px; line-height:11px; text-align:center; display:block; font-style:normal; }
.cell .badge { height:14px; margin-top:1px; display:flex; align-items:center; }
.cell .badge .sekki { font-size:8px; font-weight:800; padding:1px 5px; border-radius:4px;
  background:var(--gold); color:var(--paper); letter-spacing:.5px; white-space:nowrap; }
.cell .badge .evdot { width:4px; height:4px; border-radius:50%; background:var(--red); }
.cell.today { background:var(--chip-bg); border-radius:12px; box-shadow:inset 0 0 0 1.6px var(--red); }

/* ===== 詳細 ===== */
.dhead { display:flex; align-items:center; padding:8px 12px; border-bottom:1px solid var(--line2); }
.dhead .back { font-size:15px; color:var(--red); padding:6px 10px 6px 0; }
.dhead .dtitle { flex:1; min-width:0; text-align:center; font-size:15px; font-weight:700;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dhead .addev { font-size:12px; font-weight:700; color:var(--red); padding:6px 10px;
  border:1px solid var(--line); border-radius:18px; white-space:nowrap; flex:none; }
.dhead .dset-btn { width:34px; height:34px; border-radius:50%; background:var(--grid-bg);
  border:1px solid var(--line); color:var(--sub); font-size:16px; flex:none; margin-left:6px;
  display:flex; align-items:center; justify-content:center; padding:0; line-height:1; }
.dbody { flex:1; overflow-y:auto; padding:0 20px calc(24px + env(safe-area-inset-bottom)); }
.hero { text-align:center; padding:10px 0 8px; border-bottom:1px solid var(--line); }
.hero .era { font-size:13px; letter-spacing:2px; color:var(--sub); font-weight:600; }
.hero .bigrow { display:flex; align-items:center; justify-content:center; gap:20px; }
.hero .big { font-size:44px; font-weight:900; letter-spacing:-.5px; line-height:1.1; }
.hero .big.sun { color:var(--red); } .hero .big.sat { color:var(--sat); }
.daynav { width:34px; height:34px; flex:none; border-radius:50%; background:var(--grid-bg);
  border:1px solid var(--line); color:var(--sub); font-size:14px;
  display:flex; align-items:center; justify-content:center; padding:0; }
/* 曜日を中央に、潮を右端に表示 */
.hero .sub { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:6px; margin-top:3px; }
.hero .sub-side { display:flex; align-items:center; gap:8px; min-width:0; }
.hero .sub-side.right { justify-content:flex-end; flex-wrap:nowrap; }
.hero .tide-chip { flex:none; }
.hero .wd { font-size:14px; letter-spacing:2px; font-weight:600; color:var(--ink-soft); }
.hero .wd.sun { color:var(--red); } .hero .wd.sat { color:var(--sat); }
.hero .tide-chip { font-size:11px; font-weight:800; letter-spacing:1px; padding:4px 11px;
  border-radius:20px; background:var(--chip-bg); color:var(--ink-soft); }
.hero .evline { text-align:left; margin-top:8px; font-size:12px; font-weight:600;
  letter-spacing:1px; color:var(--gold); line-height:1.6; }
.hero .evline .holiday { color:var(--red); }

.card { background:var(--paper2); border:1px solid var(--line2); border-radius:14px;
  padding:8px 12px; margin-top:9px; }
.card .chead { display:flex; align-items:center; justify-content:space-between; }
.card .ctitle { font-size:14px; font-weight:700; letter-spacing:2px; }
.card .add-ev { width:30px; height:30px; border-radius:50%; background:var(--chip-bg);
  font-size:17px; line-height:1; color:var(--red); flex:none; padding:0;
  display:flex; align-items:center; justify-content:center; }
.noev { font-size:12px; color:var(--faint); padding:6px 0; }
.evrow { display:flex; gap:10px; align-items:flex-start; margin-top:6px; }
.evrow .bar { width:3px; align-self:stretch; border-radius:3px; }
.evrow .time { width:48px; font-size:13px; font-weight:800; }
.evrow .time small { display:block; font-size:13px; font-weight:800; }
.evrow .et { font-size:13.5px; font-weight:700; }
.evrow .et small { display:block; font-size:10px; color:var(--sub); font-weight:400; }
.evrow .maplink { color:var(--sat); text-decoration:underline; text-underline-offset:2px; }
.evrow .rep-tag { font-size:10px; font-weight:700; color:var(--sat); margin-left:4px;
  border:1px solid var(--line); border-radius:8px; padding:0 5px; white-space:nowrap; }

.irow { display:flex; gap:14px; padding:8px 0; border-bottom:1px solid var(--line2); }
.irow .lbl { width:50px; flex:none; font-size:11px; font-weight:700; letter-spacing:2px; color:var(--sub); padding-top:2px; }
.irow .main { font-size:15px; font-weight:600; }
.irow .main small { font-size:11px; color:var(--sub); font-weight:400; margin-left:7px; }
.irow .note { font-size:11.5px; color:var(--sub); margin-top:3px; }
.irow .moonbig { margin-left:auto; }
.sekki-badge { font-size:11px; font-weight:800; padding:2px 8px; border-radius:5px;
  background:var(--gold); color:var(--paper); margin-right:8px; }

.kgrid { display:flex; gap:6px; margin-top:7px; }
.kcell { flex:1 1 0; min-width:0; text-align:center; background:var(--grid-bg); border:1px solid var(--line2);
  border-radius:11px; padding:8px 2px 9px; overflow:hidden; }
.kcell .l { font-size:9px; font-weight:700; letter-spacing:1.5px; color:var(--sub); }
.kcell .v { font-size:19px; font-weight:900; margin:2px 0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.kcell .v.taian { color:var(--red); }
.kcell .s { font-size:8px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.senrow { display:flex; align-items:flex-start; gap:6px; margin-top:7px; }
.senrow .lbl { font-size:10px; font-weight:700; letter-spacing:2px; color:var(--sub); flex:none; padding-top:4px; }
.chips { display:flex; flex-wrap:wrap; gap:6px; }
.chip { flex:none; display:flex; align-items:center; gap:4px; font-size:11.5px; font-weight:700;
  padding:4px 11px; border-radius:20px; border:1px solid var(--line); color:var(--sub); }
.chip i { width:5px; height:5px; border-radius:50%; background:var(--sat); display:block; }
.chip.ok { border-color:transparent; background:var(--chip-bg); color:var(--ink); }
.chip.ok i { background:var(--gold); }
.chip.ok.big { background:var(--red); color:#fff; }
.chip.ok.big i { background:rgba(255,255,255,.9); }
.chip.ng.big { border-color:var(--ink); }

.tide-head { display:flex; align-items:center; justify-content:space-between; }
.tide-head .t { font-size:14px; font-weight:700; letter-spacing:2px; }
.tide-head .t small { font-size:10.5px; color:var(--sub); font-weight:600; margin-left:6px; letter-spacing:0; }
.tide-pill { font-size:11px; font-weight:800; letter-spacing:1.5px; padding:3px 10px;
  border-radius:20px; background:var(--gold); color:#fff; }
.tide-pill.oo { background:var(--red); }
.tide-cells { display:flex; gap:7px; margin-top:7px; }
.tcell { flex:1; text-align:center; background:var(--grid-bg); border:1px solid var(--line2);
  border-radius:11px; padding:5px 0; }
.tcell .tt { font-size:10px; font-weight:800; letter-spacing:1.5px; }
.tcell .tt.hi { color:var(--red); } .tcell .tt.lo { color:var(--sat); }
.tcell .tv { font-size:17px; font-weight:800; }
.tcell .tl { font-size:10px; font-weight:600; color:var(--sub); }
.dfoot { display:flex; justify-content:space-between; font-size:10.5px; color:var(--sub);
  padding-top:6px; margin-top:8px; border-top:1px solid var(--line2); }
.disclaimer { font-size:10px; color:var(--faint); margin-top:10px; line-height:1.5; }

/* ===== モーダル・シート ===== */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.46); z-index:50;
  display:none; align-items:flex-end; justify-content:center; }
.overlay.center { align-items:center; padding:24px; }
.overlay.open { display:flex; }
.sheet { background:var(--paper); width:100%; max-height:86vh; overflow-y:auto;
  border-radius:18px 18px 0 0; padding:16px 18px calc(20px + env(safe-area-inset-bottom)); }
.modal { background:var(--paper); border-radius:16px; padding:18px; max-width:340px; width:100%; }
.modal .cat { font-size:11px; font-weight:700; letter-spacing:2px; color:var(--gold); }
.modal .term { font-size:24px; font-weight:900; margin:4px 0 0; }
.modal .yomi { font-size:12px; color:var(--sub); margin-bottom:8px; }
.modal .desc { font-size:13px; line-height:1.8; }
.modal .catdesc { font-size:11.5px; line-height:1.7; color:var(--sub); margin-top:10px;
  padding-top:10px; border-top:1px solid var(--line2); }
.modal .close { display:block; margin:14px auto 0; font-size:13px; font-weight:700; color:var(--red); }

.sheet h3 { font-size:15px; font-weight:800; text-align:center; margin-bottom:12px; }
.frow { display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:10px 0; border-bottom:1px solid var(--line2); }
.frow label { font-size:13px; font-weight:600; flex:none; }
.frow input[type="text"], .frow input[type="time"], .frow select {
  font:inherit; font-size:14px; padding:7px 10px; border:1px solid var(--line); border-radius:9px;
  background:var(--grid-bg); color:var(--ink); flex:1; min-width:0; }
.frow input[type="text"], .frow select { -webkit-appearance:none; }
.frow input[type="checkbox"] { width:20px; height:20px; accent-color:var(--red); }
.time-select { display:flex; align-items:center; gap:6px; flex:1; }
.time-select select { font:inherit; font-size:14px; padding:7px 10px; border:1px solid var(--line);
  border-radius:9px; background:var(--grid-bg); color:var(--ink); flex:1; min-width:0; -webkit-appearance:none; }
.time-select span { color:var(--sub); font-weight:700; }
.emoji-row { display:flex; gap:8px; overflow-x:auto; padding:10px 0; -webkit-overflow-scrolling:touch; }
.emoji-row button { font-size:24px; padding:5px 7px; border-radius:50%; flex:none; }
.emoji-row button.sel { background:var(--chip-bg); box-shadow:inset 0 0 0 1.5px var(--red); }
.emoji-row button.tpre { font-size:17px; font-weight:800; color:var(--red);
  border:1.5px solid var(--red); border-radius:50%; width:38px; height:38px; padding:0;
  font-family:"Shippori Mincho",serif; }
.sheet-actions { display:flex; gap:10px; margin-top:16px; }
.sheet-actions button { flex:1; padding:12px; border-radius:12px; font-size:14px; font-weight:700; }
.btn-cancel { background:var(--grid-bg); border:1px solid var(--line); color:var(--sub); }
.btn-save { background:var(--red); color:#fff; }
.btn-save:disabled { opacity:.4; }
.btn-delete { width:100%; margin-top:10px; padding:11px; border-radius:12px; font-size:13px;
  font-weight:700; color:var(--red); border:1px solid var(--red); }

.evdet-head { display:flex; align-items:flex-start; gap:10px; margin-bottom:14px; }
.evdet-head .emoji { font-size:24px; line-height:1.3; }
.evdet-head h3 { flex:1; font-size:17px; font-weight:800; text-align:left; margin:0; }
.evdet-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line2);
  font-size:13.5px; }
.evdet-row .ic { flex:none; width:20px; text-align:center; font-size:15px; }
.evdet-row .rep-tag { font-size:11px; font-weight:700; color:var(--sat); margin-left:2px; }
</style>
</head>
<body data-palette="paper" data-density="standard" data-font="gothic">

<!-- 月間ビュー -->
<div class="screen" id="monthScreen">
  <div class="mhead">
    <span class="micon" id="monthIcon"></span>
    <div class="era serif" id="eraLine"></div>
    <div class="ym">
      <button class="nav-btn" id="prevBtn">&#10094;</button>
      <span class="ylabels">
        <span class="y" id="yLabel"></span>
        <span class="m" id="mLabel"></span>
        <span class="wafu serif" id="wafuLabel"></span>
      </span>
      <button class="nav-btn" id="nextBtn">&#10095;</button>
    </div>
    <button class="gear-btn" id="gearBtn" aria-label="設定">&#9776;</button>
  </div>
  <button id="gcalBanner" hidden>⚠ Googleカレンダーの再接続が必要です（タップして再接続）</button>
  <div class="wrow" id="weekRow"></div>
  <div class="grid-wrap"><div class="grid" id="grid"></div></div>
</div>

<!-- 日詳細 -->
<div class="screen" id="detailScreen">
  <div class="dhead">
    <button class="back" id="backBtn">&#10094; 戻る</button>
    <div class="dtitle" id="dTitle"></div>
    <button class="addev" id="addEvBtn">＋予定を追加</button>
    <button class="dset-btn" id="dGearBtn" aria-label="設定">&#9776;</button>
  </div>
  <div class="dbody" id="dBody"></div>
</div>

<!-- 予定詳細 -->
<div class="overlay" id="evDetailOverlay">
  <div class="sheet" id="evDetailSheet"></div>
</div>

<!-- 予定シート -->
<div class="overlay" id="evOverlay">
  <div class="sheet" id="evSheet"></div>
</div>

<!-- 設定シート -->
<div class="overlay" id="setOverlay">
  <div class="sheet">
    <h3>設定</h3>
    <button id="installBtn" hidden>📲 ホーム画面に追加</button>
    <div class="frow"><label>配色</label>
      <select id="setPalette">
        <option value="paper">生成り</option><option value="sumi">墨</option><option value="ai">藍</option><option value="pop">ポップ</option>
      </select></div>
    <div class="frow"><label>密度</label>
      <select id="setDensity">
        <option value="simple">すっきり</option><option value="standard" selected>標準</option><option value="detail">詳しく</option>
      </select></div>
    <div class="frow"><label>書体</label>
      <select id="setFont">
        <option value="gothic">ゴシック</option><option value="mincho">明朝</option>
      </select></div>
    <div class="frow"><label>文字サイズ</label>
      <select id="setFontSize">
        <option value="small">小</option><option value="standard" selected>標準</option><option value="large">大</option>
      </select></div>
    <div class="frow"><label>地域（潮汐・日の出入り）</label>
      <select id="setRegion"></select></div>
    <div class="frow" id="openDisplaySettings" style="cursor:pointer">
      <label>表示設定</label>
      <span style="color:var(--sub);font-size:13px">六曜・旧暦などの項目 &#10095;</span>
    </div>
    <div class="frow" style="flex-direction:column;align-items:stretch;gap:6px">
      <label>Googleカレンダー連携</label>
      <input type="text" id="setGcalId" placeholder="OAuthクライアントID（〜.apps.googleusercontent.com）" style="font-size:11px">
      <div style="display:flex;gap:8px;align-items:center">
        <button id="gcalConnect" style="flex:1;padding:9px;border-radius:10px;background:var(--chip-bg);color:var(--ink);font-size:13px;font-weight:700;border:1px solid var(--line)">接続して同期</button>
        <button id="gcalDisconnect" style="padding:9px 12px;border-radius:10px;color:var(--sub);font-size:12px;border:1px solid var(--line)">解除</button>
      </div>
      <div id="gcalStatus" style="font-size:11px;color:var(--sub)"></div>
    </div>
    <div style="text-align:center;font-size:11px;margin-top:14px">
      <button id="reloadBtn" style="color:var(--sub)">↻ 再読み込み</button>
      <span style="color:var(--faint)">　・　</span>
      <a href="privacy.html" style="color:var(--sub)">プライバシーポリシー</a>
      <span style="color:var(--faint)">　・　</span>
      <a href="terms.html" style="color:var(--sub)">利用規約</a>
    </div>
    <div class="sheet-actions">
      <button class="btn-save" id="setClose">閉じる</button>
    </div>
  </div>
</div>

<!-- 表示設定シート -->
<div class="overlay" id="displayOverlay">
  <div class="sheet">
    <h3>表示設定</h3>
    <div class="frow"><label>六曜</label><input type="checkbox" id="dispRokuyo"></div>
    <div class="frow"><label>旧暦</label><input type="checkbox" id="dispLunar"></div>
    <div class="frow"><label>節気</label><input type="checkbox" id="dispSekki"></div>
    <div class="frow"><label>月相</label><input type="checkbox" id="dispMoon"></div>
    <div class="frow"><label>干支</label><input type="checkbox" id="dispEto"></div>
    <div class="frow"><label>九星</label><input type="checkbox" id="dispKyusei"></div>
    <div class="frow"><label>中段</label><input type="checkbox" id="dispChoku"></div>
    <div class="frow"><label>宿</label><input type="checkbox" id="dispShuku"></div>
    <div class="frow"><label>選日・下段</label><input type="checkbox" id="dispSenjitsu"></div>
    <div class="frow"><label>潮汐</label><input type="checkbox" id="dispTide"></div>
    <div class="sheet-actions">
      <button class="btn-save" id="displayClose">閉じる</button>
    </div>
  </div>
</div>

<!-- 解説モーダル -->
<div class="overlay center" id="infoOverlay">
  <div class="modal" id="infoModal"></div>
</div>

<!-- ホーム画面追加の案内モーダル（iOS等の手動手順用） -->
<div class="overlay center" id="installOverlay">
  <div class="modal" id="installModal"></div>
</div>

</body>
</html>
