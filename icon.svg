<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b3140"/>
      <stop offset="100%" stop-color="#14171f"/>
    </linearGradient>
    <radialGradient id="moonG" cx="0.4" cy="0.35" r="1">
      <stop offset="0%" stop-color="#f3dfa0"/>
      <stop offset="100%" stop-color="#d9b96a"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- 三日月 -->
  <circle cx="368" cy="132" r="86" fill="url(#moonG)"/>
  <circle cx="398" cy="110" r="78" fill="#1d222d"/>
  <circle cx="368" cy="132" r="86" fill="none" stroke="#e9c46a" stroke-opacity="0.25" stroke-width="2"/>
  <!-- 星 -->
  <circle cx="120" cy="92" r="4" fill="#e9c46a" opacity="0.8"/>
  <circle cx="180" cy="150" r="2.5" fill="#e9c46a" opacity="0.5"/>
  <circle cx="86" cy="180" r="3" fill="#e9c46a" opacity="0.6"/>
  <!-- 暦 -->
  <text x="244" y="402" font-size="300" font-weight="700" text-anchor="middle"
        font-family="'Hiragino Mincho ProN','Yu Mincho',serif" fill="#f4efe2">暦</text>
  <!-- 朱の落款 -->
  <rect x="392" y="392" width="72" height="72" rx="12" fill="#b0433a"/>
  <text x="428" y="446" font-size="46" font-weight="700" text-anchor="middle"
        font-family="'Hiragino Mincho ProN','Yu Mincho',serif" fill="#f4efe2">和</text>
</svg>
